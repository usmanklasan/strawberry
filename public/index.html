<!DOCTYPE html>

<html>

<head>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1020" />

    <title>Strawberry</title>
</head>

<body>
    <main class="cheesy-shell" aria-label="Strawberry home">
        <div class="cheesy-center">
            <div class="cheesy-logo-wrap">
                <img class="cheesy-logo" src="logo.png" alt="Strawberry" />
            </div>
            <h1 class="cheesy-title">Strawberry</h1>
            <p class="cheesy-subtitle">Welcome to Strawberry! Experience a fast, secure, and reliable proxy.</p>
            <p class="cheesy-subtitle muted">Enter a URL to start browsing.</p>

            <p class="alert alert-danger cheesy-error" id="error-text" style="display: none">Error: some text</p>

            <div class="cheesy-search">
                <input type="text" class="cheesy-input" id="session-url" placeholder="Enter URL or search..." autocomplete="off" />
                <button class="cheesy-go" id="session-go" aria-label="Go">
                    <span aria-hidden="true">→</span>
                </button>
            </div>

            <div class="cheesy-password" id="password-wrapper" style="display: none" aria-label="Password required">
                <input type="password" class="cheesy-input" id="session-password" placeholder="Enter password..." autocomplete="current-password" />
            </div>

            <div class="cheesy-copyright">©2026 Strawberry</div>
        </div>

        <nav class="cheesy-dock" aria-label="Quick actions">
            <a class="dock-btn" href="#" aria-label="Home">
                <span class="dock-ic" aria-hidden="true">⌂</span>
            </a>
            <a class="dock-btn" href="#" aria-label="Sessions">
                <span class="dock-ic" aria-hidden="true">⧉</span>
            </a>
            <a class="dock-btn" href="#" aria-label="Games">
                <span class="dock-ic" aria-hidden="true">⌁</span>
            </a>
            <a class="dock-btn" href="#" aria-label="Tools">
                <span class="dock-ic" aria-hidden="true">🛠</span>
            </a>
            <a class="dock-btn" href="#" aria-label="Settings">
                <span class="dock-ic" aria-hidden="true">⚙</span>
            </a>
            <a class="dock-btn" href="#" aria-label="Legal">
                <span class="dock-ic" aria-hidden="true">⚖</span>
            </a>
        </nav>

        <!-- Hidden legacy controls kept for compatibility (script.js expects these IDs). -->
        <section class="legacy" aria-hidden="true">
            <div class="input-group mb-3">
                <div class="input-group-prepend">
                    <span class="input-group-text">Session ID</span>
                </div>
                <input readonly type="text" class="form-control disable-text" id="session-id" placeholder="Session ID">
                <div class="input-group-append">
                    <button class="btn btn-secondary" id="session-create-btn" type="button">Create new session ID</button>
                </div>
            </div>

            <button class="btn btn-outline-secondary" id="session-advanced-toggle">Advanced options</button>
            <div class="mt-2 mb-4" id="session-advanced-container" style="display: none">
                <div class="form-check mb-1">
                    <input class="form-check-input" type="checkbox" value="" id="session-shuffling" checked>
                    <label class="form-check-label" for="session-shuffling">Enable URL shuffling</label>
                </div>
                <div class="input-group mb-3">
                    <div class="input-group-prepend">
                        <span class="input-group-text">HTTP Proxy</span>
                    </div>
                    <input type="text" class="form-control" id="session-httpproxy" placeholder="http://...">
                </div>
            </div>

            <div class="row justify-content-center m-0">
                <table class="table w-75 table-striped table-bordered">
                    <thead>
                        <tr>
                            <th>Session ID</th>
                            <th>Created on</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</body>

</html>
