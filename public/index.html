<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a12" />

    <title>Strawberry</title>
</head>

<body>
    <div id="lunar-app" class="lunar-app">
        <header class="lunar-chrome">
            <div class="lunar-brand">
                <img class="lunar-brand-icon" src="logo.png" alt="" width="28" height="28" />
                <span class="lunar-brand-text">Strawberry</span>
                <span class="lunar-ver">v2</span>
            </div>

            <div class="lunar-urlbar-wrap">
                <div class="lunar-urlbar">
                    <span class="lunar-scheme" id="lunar-scheme">strawberry://</span>
                    <span class="lunar-path-hint" id="lunar-path-hint" aria-hidden="true">new</span>
                    <input type="text" class="lunar-url-input" id="session-url" placeholder="Search or enter URL..."
                        spellcheck="false" autocomplete="off" aria-label="Address" />
                    <button type="button" class="lunar-go" id="session-go" title="Go">→</button>
                </div>
            </div>

            <button type="button" class="lunar-menu-toggle" id="lunar-sidebar-toggle" aria-label="Menu" aria-expanded="false">☰</button>
        </header>

        <p class="alert alert-danger lunar-error" id="error-text" style="display: none" role="alert"></p>

        <div class="lunar-password" id="password-wrapper" style="display: none">
            <input type="password" class="lunar-password-input" id="session-password" placeholder="Session password..."
                autocomplete="current-password" />
        </div>

        <main class="lunar-main">
            <div id="lunar-tabbar" class="lunar-tabbar" aria-label="Tabs" hidden></div>
            <section id="lunar-home" class="lunar-home" aria-label="New tab">
                <div class="lunar-clock-wrap">
                    <div class="lunar-clock" id="lunar-clock">--:--:--</div>
                    <div class="lunar-tagline">Strawberry</div>
                </div>

                <div class="lunar-quicklinks-block">
                    <h2 class="lunar-quick-heading">Quick links</h2>
                    <nav class="lunar-shortcuts" aria-label="Quick links">
                    <button type="button" class="lunar-shortcut" data-quick-url="https://www.youtube.com/" title="YouTube">
                        <span class="lunar-sic">▶</span><span class="lunar-slabel">YouTube</span>
                    </button>
                    <button type="button" class="lunar-shortcut" data-quick-url="https://x.com/" title="X">
                        <span class="lunar-sic">𝕏</span><span class="lunar-slabel">X</span>
                    </button>
                    <button type="button" class="lunar-shortcut" data-quick-url="https://github.com/" title="GitHub">
                        <span class="lunar-sic">⌘</span><span class="lunar-slabel">GitHub</span>
                    </button>
                    <button type="button" class="lunar-shortcut" data-quick-url="https://www.google.com/" title="Google">
                        <span class="lunar-sic">G</span><span class="lunar-slabel">Google</span>
                    </button>
                    <button type="button" class="lunar-shortcut" data-quick-url="https://www.wikipedia.org/" title="Wikipedia">
                        <span class="lunar-sic">W</span><span class="lunar-slabel">Wikipedia</span>
                    </button>
                    <button type="button" class="lunar-shortcut" data-quick-url="https://duckduckgo.com/" title="DuckDuckGo">
                        <span class="lunar-sic">🦆</span><span class="lunar-slabel">DuckDuckGo</span>
                    </button>
                    </nav>
                    <div class="lunar-home-ad-leaderboard" aria-label="Advertisement">
                        <div id="strawberry-leaderboard-slot" class="strawberry-leaderboard-frame"></div>
                        <script>
                            atOptions = {
                                key: 'cdb89e040a7a3bdc884365314445d379',
                                format: 'iframe',
                                height: 90,
                                width: 728,
                                params: {}
                            };
                        </script>
                        <script src="https://establishscarcely.com/cdb89e040a7a3bdc884365314445d379/invoke.js"></script>
                    </div>
                </div>
            </section>

            <div id="lunar-frame-stack" class="lunar-frame-stack">
            <iframe id="proxy-frame" class="lunar-frame" name="strawberry-proxy" data-strawberry-proxy="1" title="Browsing" sandbox="allow-scripts allow-forms allow-popups allow-modals allow-same-origin allow-pointer-lock allow-downloads"></iframe>
            </div>
        </main>

        <aside class="lunar-sidebar" id="lunar-sidebar" aria-label="Tools">
            <div class="lunar-side-inner">
                <div class="lunar-side-head">
                    <h2 id="lunar-side-heading" class="lunar-side-title">Menu</h2>
                    <button type="button" class="lunar-sidebar-close" id="lunar-sidebar-close" aria-label="Close menu">×</button>
                </div>
                <nav class="lunar-side-nav" aria-labelledby="lunar-side-heading">
                    <button type="button" class="lunar-side-btn" id="lunar-action-newtab">
                        <span class="lunar-side-label">New tab</span>
                        <span class="lunar-side-keys" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>N</kbd></span>
                    </button>
                    <button type="button" class="lunar-side-btn" id="lunar-action-fullscreen">
                        <span class="lunar-side-label">Full screen</span>
                        <span class="lunar-side-keys" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>Z</kbd></span>
                    </button>
                    <button type="button" class="lunar-side-btn" id="lunar-action-reload">
                        <span class="lunar-side-label">Reload frame</span>
                        <span class="lunar-side-keys" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>R</kbd></span>
                    </button>
                    <button type="button" class="lunar-side-btn lunar-side-btn--toggle" id="lunar-action-dark" aria-pressed="true">
                        <span class="lunar-side-label">Dark mode</span>
                        <span class="lunar-side-keys" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>X</kbd></span>
                    </button>
                    <button type="button" class="lunar-side-btn lunar-side-btn--toggle" id="lunar-action-cloak" aria-pressed="true">
                        <span class="lunar-side-label">AB Cloak (iframe)</span>
                        <span class="lunar-side-keys" aria-hidden="true"><kbd>Ctrl</kbd>+<kbd>Alt</kbd>+<kbd>C</kbd></span>
                    </button>
                    <button type="button" class="lunar-side-btn lunar-side-btn--action-only" id="lunar-action-home">
                        <span class="lunar-side-label">Home / clear</span>
                    </button>
                </nav>
            </div>
        </aside>

        <footer class="lunar-footer">
            <span class="lunar-footer-left" id="lunar-ping">Ready</span>
            <span class="lunar-footer-right">v2.0.0 · Strawberry</span>
        </footer>
    </div>

    <div class="strawberry-ad-sky strawberry-ad-sky--left" id="strawberry-sky-left" aria-hidden="true">
        <div class="strawberry-ad-sky-inner" id="strawberry-sky-left-slot"></div>
    </div>
    <div class="strawberry-ad-sky strawberry-ad-sky--right" id="strawberry-sky-right" aria-hidden="true">
        <div class="strawberry-ad-sky-inner" id="strawberry-sky-right-mirror"></div>
    </div>

    <script>
        (function () {
            var SKY_LEFT = 'strawberry-sky-left-slot';
            var SKY_RIGHT = 'strawberry-sky-right-mirror';
            function injectInvoke(container, opts, src, onload) {
                var el = document.getElementById(container);
                if (!el) return;
                window.atOptions = opts;
                var s = document.createElement('script');
                s.async = true;
                s.src = src;
                if (onload) s.onload = onload;
                el.appendChild(s);
            }
            function loadSkySecond() {
                injectInvoke(
                    SKY_RIGHT,
                    { key: 'bb2ce733dca3e1dd6882409b2b5b25d0', format: 'iframe', height: 600, width: 160, params: {} },
                    'https://establishscarcely.com/bb2ce733dca3e1dd6882409b2b5b25d0/invoke.js'
                );
            }
            function loadSkyFirst() {
                injectInvoke(
                    SKY_LEFT,
                    { key: 'bb2ce733dca3e1dd6882409b2b5b25d0', format: 'iframe', height: 600, width: 160, params: {} },
                    'https://establishscarcely.com/bb2ce733dca3e1dd6882409b2b5b25d0/invoke.js',
                    loadSkySecond
                );
            }
            function shouldLoadSkyscrapers() {
                try {
 return window.matchMedia('(min-width: 1280px)').matches;
} catch (e) {
 return window.innerWidth >= 1280;
}
            }
            function bootAds() {
                if (shouldLoadSkyscrapers()) loadSkyFirst();
            }
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootAds);
            } else {
                bootAds();
            }
        })();
    </script>

    <!-- Legacy IDs for script.js -->
    <section class="legacy" aria-hidden="true">
        <div class="input-group mb-3">
            <div class="input-group-prepend"><span class="input-group-text">Session ID</span></div>
            <input readonly type="text" class="form-control disable-text" id="session-id" placeholder="Session ID">
            <div class="input-group-append">
                <button class="btn btn-secondary" id="session-create-btn" type="button">Create new session ID</button>
            </div>
        </div>
        <button class="btn btn-outline-secondary" id="session-advanced-toggle">Advanced options</button>
        <div class="mt-2 mb-4" id="session-advanced-container" style="display: none">
            <div class="form-check mb-1">
                <input class="form-check-input" type="checkbox" value="" id="session-shuffling" checked>
                <label class="form-check-label" for="session-shuffling">Enable URL shuffling</label>
            </div>
            <div class="input-group mb-3">
                <div class="input-group-prepend"><span class="input-group-text">HTTP Proxy</span></div>
                <input type="text" class="form-control" id="session-httpproxy" placeholder="http://...">
            </div>
        </div>
        <table class="table w-75 table-striped table-bordered">
            <thead>
                <tr><th>Session ID</th><th>Created on</th></tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>
</body>

</html>
